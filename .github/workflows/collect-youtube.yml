name: Collect YouTube

# Mines a curated list of AI/indie-project review channels for the projects they
# showcase. Low frequency (weekly) — YouTube Data API v3 quota is per-day and
# new review videos land slowly. Also exposed as a manual trigger.

on:
  schedule:
    - cron: '0 8 * * 1' # Weekly: Monday 08:00 UTC
  workflow_dispatch: {}

concurrency:
  group: collect-youtube
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run YouTube collector
        run: pnpm collect:youtube
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Google Cloud API key with "YouTube Data API v3" enabled. The script
          # exits cleanly (no failure) when this is unset.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
