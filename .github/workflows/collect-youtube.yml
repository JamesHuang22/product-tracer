name: Collect YouTube

# Mines the authenticated user's YouTube subscriptions (via OAuth) for the
# projects their latest videos showcase. Runs every 8h; the per-channel quota
# cost is tiny (uploads playlist + videos.list, ~2 units/channel). Also exposed
# as a manual trigger. Falls back to the static channel list + API key when no
# OAuth refresh token is configured.

on:
  schedule:
    - cron: '0 */8 * * *' # Every 8 hours
  workflow_dispatch: {}

concurrency:
  group: collect-youtube
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Surfaced for the `if:` guard on the refresh step (secrets aren't
      # directly usable in step-level conditions).
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Refresh Google OAuth token
        id: gtoken
        if: ${{ env.GOOGLE_REFRESH_TOKEN != '' }}
        run: |
          TOKEN="$(node apps/worker/src/scripts/refresh-google-token.mjs)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

      - name: Run YouTube collector
        run: pnpm collect:youtube
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Fresh OAuth access token (preferred — enables dynamic subscriptions).
          # Empty when no refresh token is configured; the collector then falls
          # back to the API key + static channel list below.
          GOOGLE_OAUTH_TOKEN: ${{ steps.gtoken.outputs.token }}
          # Google Cloud API key with "YouTube Data API v3" enabled (fallback).
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
