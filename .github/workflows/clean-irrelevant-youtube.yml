name: Clean Irrelevant YouTube

# Audits app.video_insight with the LLM (no keyword lists) and DELETEs any
# non-tech content, so /youtube-insights carries zero food/lifestyle/daily-chat
# rows. Runs weekly (Sunday 06:00 UTC) over the last 7 days, and on demand for a
# full re-scan. Secrets come from GitHub. (TASK-024 → TASK-028-REV)

on:
  schedule:
    - cron: '0 6 * * 0' # Sundays 06:00 UTC — weekly audit of recent rows
  workflow_dispatch: {}

concurrency:
  group: clean-irrelevant-youtube
  cancel-in-progress: false

jobs:
  clean:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @product-tracer/worker youtube:clean
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          # Scheduled runs audit only the last 7 days; manual dispatch (empty
          # github.event.schedule) audits the whole table.
          AUDIT_DAYS: ${{ github.event.schedule && '7' || '0' }}
